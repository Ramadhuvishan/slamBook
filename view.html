<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memories Vault 💝</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS THEME VARIABLES */
        :root {
            --bg-overlay: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --card-front-bg: rgba(255, 255, 255, 0.95);
            --card-back-bg: #fffaf0;
            --accent-color: #ff6b6b;
            --sub-text: #777;
            --border-color: #4ecdc4;
        }

        /* NEON CYBERPUNK THEME overrides */
        [data-theme="cyberpunk"] {
            --nav-bg: rgba(20, 20, 30, 0.95);
            --text-color: #00ffcc;
            --card-front-bg: rgba(15, 15, 25, 0.95);
            --card-back-bg: #1a1a2e;
            --accent-color: #ff007f;
            --sub-text: #00bfff;
            --border-color: #ff007f;
        }

        /* CLASSIC PASTEL JOURNAL overrides */
        [data-theme="pastel"] {
            --nav-bg: rgba(255, 240, 245, 0.95);
            --text-color: #6c5ce7;
            --card-front-bg: rgba(255, 255, 255, 0.95);
            --card-back-bg: #e8f4f8;
            --accent-color: #fd79a8;
            --sub-text: #a29bfe;
            --border-color: #74b9ff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: url('https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?q=80&w=1974') no-repeat center center fixed; 
            background-size: cover;
            padding: 40px 20px; 
            transition: background 0.5s ease;
        }

        /* Background Changes based on Themes */
        body[data-theme="cyberpunk"] { background: url('https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        body[data-theme="pastel"] { background: url('https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?q=80&w=1920') no-repeat center center fixed; background-size: cover; }

        .header-nav {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: var(--nav-bg);
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            gap: 15px;
        }

        .header-nav h1 { margin: 0; font-size: 24px; color: var(--accent-color); }

        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Interactive controls utility styling */
        .utility-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            width: 40px;
            height: 40px;
        }
        .utility-btn:hover { transform: scale(1.1); filter: brightness(0.9); }
        .utility-btn.music-on { background: #2ed573; }

        .theme-select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            background: var(--card-front-bg);
            color: var(--text-color);
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        .search-bar-container {
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }
        .search-input {
            width: 100%;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: var(--nav-bg);
            color: var(--text-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .search-input:focus { box-shadow: 0 4px 20px var(--accent-color); }

        .back-btn {
            text-decoration: none;
            background: #333;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: var(--accent-color); }

        .entries-container { max-width: 1000px; margin: 0 auto; }
        .entries-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 35px; 
        }

        /* 3D CARD FLIP CONTAINER SYSTEM */
        .flip-card-container {
            background-color: transparent;
            width: 100%;
            height: 330px;
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Trigger flip class handled gracefully by JS click and CSS hover */
        .flip-card-container:hover .flip-card-inner,
        .flip-card-container.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            background: var(--card-front-bg); 
            border-top: 5px solid var(--border-color);
            color: var(--text-color);
        }

        .card-back {
            background: var(--card-back-bg);
            color: var(--text-color);
            transform: rotateY(180deg);
            border-top: 5px solid var(--accent-color);
        }

        .card img { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #ff8e53;
            margin-bottom: 12px;
        }

        .card h4 { margin: 5px 0; font-size: 18px; }
        .card .phone-display { font-size: 0.85em; color: var(--sub-text); font-style: italic; margin-bottom: 12px; }
        .card p { font-size: 14px; line-height: 1.5; padding: 12px; border-radius: 8px; border-left: 3px solid var(--accent-color); text-align: left; margin: 0; width: 100%; box-sizing: border-box; overflow-y: auto; max-height: 140px;}
        
        .card p.encrypted-text {
            font-family: 'Courier New', Courier, monospace;
            color: #999;
            background: #f1f1f1;
            border-left: 3px solid #999;
            letter-spacing: 1px;
            word-break: break-all;
        }

        .flip-hint {
            font-size: 11px;
            color: var(--sub-text);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .no-records {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            grid-column: 1 / -1;
            font-size: 18px;
            color: #666;
        }

        /* PIN PAD SECURE DESIGN MODULE */
        .modal-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .pin-container {
            background: #1e1e24;
            color: white;
            padding: 30px;
            border-radius: 24px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
        }

        .pin-container h3 { margin-top: 0; color: #f1f1f1; font-weight: 500; }
        
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            min-height: 12px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #444;
            border-radius: 50%;
            transition: background 0.1s;
        }
        .dot.active { background: #ff6b6b; box-shadow: 0 0 8px #ff6b6b; }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .pin-btn {
            background: #2a2a35;
            border: none;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            width: 60px;
            height: 60px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .pin-btn:active, .pin-btn:hover { background: #3e3e4f; }
        .pin-btn.action-btn { font-size: 14px; background: transparent; color: #aaa; }

        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60 { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* Lock Vault Animation Panel Overlay */
        .lock-overlay {
            display: none;
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: #1e1e24;
            border-radius: 24px;
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .lock-icon {
            font-size: 50px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .unlock-animation { transform: scale(1.3) rotate(-15deg); }
    </style>
</head>
<body id="pageBody">

    <audio id="sfxClick" src="click.mp3" preload="auto"></audio>
    <audio id="sfxUnlock" src="unlock.mp3" preload="auto"></audio>
    <audio id="bgMusic" src="bg-music.mp3" preload="auto" loop></audio>

    <div class="header-nav">
        <h1>📖 Ram's Slambook Gallery</h1>
        <div class="controls-wrapper">
            <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="default">🎨 Default Theme</option>
                <option value="cyberpunk">⚡ Neon Cyberpunk</option>
                <option value="pastel">🌸 Pastel Journal</option>
            </select>
            
            <button class="utility-btn" id="musicToggle" onclick="toggleMusic()">🎵</button>
            
            <button class="utility-btn" id="masterToggle" onclick="openPinModal()">👁️</button>
            <a href="index.html" class="back-btn">✍️ Sign Slambook</a>
        </div>
    </div>

    <div class="search-bar-container">
        <input type="text" class="search-input" id="searchBar" placeholder="🔍 Search memory makers by name..." oninput="handleSearch()">
    </div>

    <div class="modal-overlay" id="pinModal">
        <div class="pin-container" id="pinBox">
            <div class="lock-overlay" id="lockLoader">
                <div class="lock-icon" id="lockEmoji">🔒</div>
                <p style="margin-top:15px; color:#4ecdc4; font-weight:bold;">Opening Vault Room...</p>
            </div>

            <h3>Enter Master Key</h3>
            <div class="pin-dots" id="pinDots"></div>
            
            <div class="pin-grid">
                <button class="pin-btn" onclick="pressKey('1')">1</button>
                <button class="pin-btn" onclick="pressKey('2')">2</button>
                <button class="pin-btn" onclick="pressKey('3')">3</button>
                <button class="pin-btn" onclick="pressKey('4')">4</button>
                <button class="pin-btn" onclick="pressKey('5')">5</button>
                <button class="pin-btn" onclick="pressKey('6')">6</button>
                <button class="pin-btn" onclick="pressKey('7')">7</button>
                <button class="pin-btn" onclick="pressKey('8')">8</button>
                <button class="pin-btn" onclick="pressKey('9')">9</button>
                <button class="pin-btn action-btn" onclick="clearPin()">Clear</button>
                <button class="pin-btn" onclick="pressKey('0')">0</button>
                <button class="pin-btn action-btn" style="color: #ff6b6b; font-weight: bold;" onclick="submitPin()">OK</button>
            </div>
            <button class="back-btn" style="margin-top:20px; background:#2a2a35; width:100%; border:none; box-sizing:border-box;" onclick="closePinModal()">Cancel</button>
        </div>
    </div>

    <div class="entries-container">
        <div class="entries-grid" id="entriesDisplay">
            <div class="no-records">Gathering memories... 🔍</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vxgcugpbwrjhqlqtiuku.supabase.co";
        const SUPABASE_KEY = "sb_publishable_J9urn-pWkAydGSzvsnASOQ_1wAdGBfD";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TARGET_KEY = "0702200219062000";
        let typedPin = "";
        let isMasterUnlocked = false;
        let isMusicPlaying = false;
        let globalEntriesCache = [];

        // Haptic Audio Router Instantiations
        function playSfx(audioId) {
            const sound = document.getElementById(audioId);
            if(sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Audio play blocked until interaction"));
            }
        }

        function toggleMusic() {
            const bgMusic = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            if(!isMusicPlaying) {
                bgMusic.play().catch(e => console.log("Music error context matching setup"));
                btn.classList.add('music-on');
                isMusicPlaying = true;
            } else {
                bgMusic.pause();
                btn.classList.remove('music-on');
                isMusicPlaying = false;
            }
        }

        // Color Theme State Setter
        function changeTheme(themeValue) {
            const body = document.getElementById('pageBody');
            if(themeValue === 'default') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', themeValue);
            }
        }

        // Custom Numeric Keyboard Tracker Modules
        function updatePinDots() {
            const container = document.getElementById('pinDots');
            container.innerHTML = '';
            for(let i=0; i<Math.max(typedPin.length, 4); i++) {
                const dot = document.createElement('div');
                dot.className = i < typedPin.length ? 'dot active' : 'dot';
                container.appendChild(dot);
            }
        }

        function pressKey(num) {
            playSfx('sfxClick');
            if(typedPin.length < 20) {
                typedPin += num;
                updatePinDots();
            }
        }

        function clearPin() {
            playSfx('sfxClick');
            typedPin = "";
            updatePinDots();
        }

        function openPinModal() {
            if(isMasterUnlocked) {
                isMasterUnlocked = false;
                document.getElementById('masterToggle').innerHTML = "👁️";
                renderGrid(globalEntriesCache);
                return;
            }
            clearPin();
            document.getElementById('pinModal').style.display = 'flex';
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
        }

        function submitPin() {
            const box = document.getElementById('pinBox');
            const loader = document.getElementById('lockLoader');
            const emoji = document.getElementById('lockEmoji');

            if (typedPin === TARGET_KEY) {
                playSfx('sfxUnlock');
                loader.style.display = 'flex';
                setTimeout(() => { emoji.innerHTML = "🔓"; emoji.classList.add('unlock-animation'); }, 200);
                
                setTimeout(() => {
                    isMasterUnlocked = true;
                    document.getElementById('masterToggle').innerHTML = "🔒";
                    loader.style.display = 'none';
                    emoji.innerHTML = "🔒";
                    emoji.classList.remove('unlock-animation');
                    closePinModal();
                    renderGrid(globalEntriesCache);
                }, 1400);
            } else {
                box.classList.add('shake');
                setTimeout(() => { box.classList.remove('shake'); }, 400);
                clearPin();
            }
        }

        function generateEncryptedLook(text) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789%@&#$';
            let result = '';
            for (let i = 0; i < Math.min(text.length, 60); i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result + '... [ENCRYPTED]';
        }

        function maskPhoneNumber(phone) {
            if (!phone || phone === 'N/A') return 'N/A';
            const cleanPhone = phone.toString().trim();
            if (cleanPhone.length < 4) return 'XXXX';
            
            const firstPart = cleanPhone.slice(0, 2);
            const lastPart = cleanPhone.slice(-2);
            const maskedLength = cleanPhone.length - 4;
            return `${firstPart}${'X'.repeat(maskedLength > 0 ? maskedLength : 4)}${lastPart}`;
        }

        // Live Dynamic Filtering Router Logic
        function handleSearch() {
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            const filtered = globalEntriesCache.filter(item => item.name.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        // 3D Card Engine Renderer Injection Setup
        function renderGrid(entries) {
            const grid = document.getElementById('entriesDisplay');
            grid.innerHTML = '';

            if(entries.length === 0) {
                grid.innerHTML = '<div class="no-records">No matched memories found inside this catalog search. 🕵️‍♂️</div>';
                return;
            }

            entries.forEach((item, index) => {
                const isLatest = (index === 0);
                const showRaw = isMasterUnlocked || isLatest;
                
                const displayMemory = showRaw ? `"${item.fav_mem}"` : generateEncryptedLook(item.fav_mem);
                const pClass = showRaw ? '' : 'class="encrypted-text"';
                const hiddenPhone = showRaw ? item.contact_number : maskPhoneNumber(item.contact_number);

                grid.innerHTML += `
                    <div class="flip-card-container card" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="card-front" style="${isLatest ? 'border-top: 5px solid #ff6b6b;' : ''}">
                                <img src="${item.avatar_url}" alt="${item.name}">
                                <h4>${item.name} ${isLatest ? '✨ <small style="font-size:11px; color:#ff6b6b; display:block">Latest</small>' : ''}</h4>
                                <div class="phone-display">📞 ${hiddenPhone}</div>
                                <div class="flip-hint">🔄 Tap to open details</div>
                            </div>
                            <div class="card-back">
                                <h4 style="margin-bottom:15px; font-size:16px; color: var(--accent-color);">Shared Note:</h4>
                                <p ${pClass}>${displayMemory}</p>
                                <div class="flip-hint" style="margin-top:15px;">🔄 Tap to turn over</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function fetchAllEntries() {
            const grid = document.getElementById('entriesDisplay');
            
            const { data: entries, error } = await supabaseClient
                .from('slambook')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                grid.innerHTML = `<div class="no-records">Error fetching pages: ${error.message}</div>`;
                return;
            }

            if (!entries || entries.length === 0) {
                grid.innerHTML = '<div class="no-records">No pages written yet! Be the first one to sign it. 🥰</div>';
                return;
            }

            globalEntriesCache = entries;
            renderGrid(entries);
        }

        // Run application setup rules
        updatePinDots();
        fetchAllEntries();
    </script>
</body>
</html>
