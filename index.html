<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Ram's Slambook 📝</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ==========================================
           CSS ENGINE MATCHED FOR SIGN ENTRY FORM
           ========================================== */
        :root {
            --form-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --accent-color: #ff6b6b;
            --input-bg: #fff;
            --input-border: #ddd;
        }

        /* LIGHT MODES */
        [data-theme="tulip"] { --form-bg: rgba(255, 255, 255, 0.95); --text-color: #4a2c2c; --accent-color: #ff4d6d; --input-bg: #fff; --input-border: #70e000; }
        [data-theme="dora"] { --form-bg: rgba(255, 253, 240, 0.95); --text-color: #ff4500; --accent-color: #a832b8; --input-bg: #fff; --input-border: #fbc02d; }
        [data-theme="kick"] { --form-bg: rgba(250, 250, 250, 0.95); --text-color: #111; --accent-color: #d32f2f; --input-bg: #fff; --input-border: #111; }
        [data-theme="cedric"] { --form-bg: rgba(253, 251, 247, 0.95); --text-color: #2c3e50; --accent-color: #e74c3c; --input-bg: #fff; --input-border: #3498db; }
        [data-theme="shinchan"] { --form-bg: rgba(255, 255, 255, 0.95); --text-color: #c0392b; --accent-color: #d32f2f; --input-bg: #fff; --input-border: #f1c40f; }
        [data-theme="doraemon"] { --form-bg: rgba(255, 255, 255, 0.95); --text-color: #0369a1; --accent-color: #ef4444; --input-bg: #fff; --input-border: #eab308; }

        /* DARK MODES */
        [data-theme="harrypotter"] { --form-bg: rgba(30, 32, 48, 0.95); --text-color: #e2e8f0; --accent-color: #d4af37; --input-bg: #1c1d24; --input-border: #7a1c1c; }
        [data-theme="powerrangers"] { --form-bg: rgba(30, 30, 30, 0.95); --text-color: #ffffff; --accent-color: #ff3838; --input-bg: #222; --input-border: #ffeb3b; }
        [data-theme="geeboombaa"] { --form-bg: rgba(46, 26, 66, 0.95); --text-color: #e0b0ff; --accent-color: #ffdf00; --input-bg: #241138; --input-border: #9b5de5; }
        [data-theme="jackiechan"] { --form-bg: rgba(38, 30, 24, 0.95); --text-color: #e67e22; --accent-color: #2ecc71; --input-bg: #2c1f16; --input-border: #d35400; }
        [data-theme="hattori"] { --form-bg: rgba(30, 41, 59, 0.95); --text-color: #38bdf8; --accent-color: #ef4444; --input-bg: #0f172a; --input-border: #38bdf8; }
        [data-theme="cyberpunk"] { --form-bg: rgba(20, 20, 30, 0.95); --text-color: #00ffcc; --accent-color: #ff007f; --input-bg: #1a1a2e; --input-border: #ff007f; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #e0f2fe, #fbcfe8);
            padding: 40px 20px; transition: background 0.5s ease;
        }

        /* Background Art Swaps matching view.html */
        body[data-theme="tulip"] { background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('./tulips.jpg') repeat center; background-size: 350px; }
        body[data-theme="dora"] { background: url('./dora.jpg') repeat center center fixed; background-size: 350px; }
        body[data-theme="kick"] { background: url('./kick.png') repeat center; background-size: 350px; }
        body[data-theme="cedric"] { background: linear-gradient(rgba(255,248,230,0.85), rgba(255,248,230,0.85)), url('https://www.transparenttextures.com/patterns/notebook.png') repeat; }
        body[data-theme="shinchan"] { background: #fbc02d url('https://i.ibb.co/fFmftm4/shinchan-chocobi.png') repeat; background-size: 120px; }
        body[data-theme="doraemon"] { background: #0ea5e9 url('https://i.ibb.co/b3j6YwQ/doraemon-cloud.png') repeat-x bottom; background-size: contain; }
        body[data-theme="harrypotter"] { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514894780887-121968d00567?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        body[data-theme="powerrangers"] { background: #111 url('https://www.transparenttextures.com/patterns/carbon-fibre.png') repeat; box-shadow: inset 0 0 100px rgba(255,0,0,0.3); }
        body[data-theme="geeboombaa"] { background: radial-gradient(circle, #4a148c 0%, #1a0033 100%); }
        body[data-theme="jackiechan"] { background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1555169062-013468b47731?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        body[data-theme="hattori"] { background: linear-gradient(rgba(10,15,30,0.8), rgba(10,15,30,0.9)), url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        body[data-theme="cyberpunk"] { background: #0b0b14 url('https://www.transparenttextures.com/patterns/grid-me.png') repeat; }

        .form-container { max-width: 550px; margin: 0 auto; background: var(--form-bg); padding: 35px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); color: var(--text-color); transition: all 0.3s; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header-row h2 { margin: 0; color: var(--accent-color); font-size: 24px; }
        .theme-select { padding: 6px 12px; border-radius: 20px; border: 2px solid var(--accent-color); background: var(--input-bg); color: var(--text-color); font-weight: bold; cursor: pointer; outline: none; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-size: 14px; outline: none; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-submit { background: var(--accent-color); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .view-gallery-link { display: block; text-align: center; margin-top: 20px; color: var(--text-color); text-decoration: none; font-size: 14px; }
        .sound-btn { background: transparent; border: none; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body id="pageBody">

    <audio id="sfxClick" src="click.mp3" preload="auto"></audio>
    <audio id="bgMusic" src="bg-music.mp3" preload="auto" loop></audio>

    <div class="form-container">
        <div class="header-row">
            <h2>✍️ Leave a Memory</h2>
            <div>
                <button class="sound-btn" onclick="toggleMusic()">🎵</button>
                <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
                    <optgroup label="💡 Light Modes">
                        <option value="default">🎨 Default Sky</option>
                        <option value="tulip">🌸 Tulip Garden</option>
                        <option value="dora">🎒 Dora Explorer</option>
                        <option value="kick">🛹 Kick Buttowski</option>
                        <option value="cedric">💼 Cedric Vintage</option>
                        <option value="shinchan">🍡 Shinchan Star</option>
                        <option value="doraemon">🔔 Doraemon Gadget</option>
                    </optgroup>
                    <optgroup label="🌙 Dark Modes">
                        <option value="harrypotter">⚡ Hogwarts Magic</option>
                        <option value="powerrangers">⚡ Power Rangers</option>
                        <option value="geeboombaa">🌀 Geeboombaa Genie</option>
                        <option value="jackiechan">🥋 Jackie Chan</option>
                        <option value="hattori">🥷 Ninja Hattori</option>
                        <option value="cyberpunk">⚡ Neon Cyberpunk</option>
                    </optgroup>
                </select>
            </div>
        </div>

        <form id="slamForm" onsubmit="handleSubmit(event)">
            <div class="form-group"> <label for="name">Your Name</label> <input type="text" id="name" required> </div>
            <div class="form-group"> <label for="contact_number">Contact Number</label> <input type="tel" id="contact_number" required> </div>
            <div class="row-grid">
                <div class="form-group"> <label for="dob">Birthday (DD Month)</label> <input type="text" id="dob" placeholder="e.g., October 24" required> </div>
                <div class="form-group">
                    <label for="blood_group">Blood Group</label>
                    <select id="blood_group" required>
                        <option value="" disabled selected>Select</option>
                        <option value="O+">O +ve</option><option value="A+">A +ve</option><option value="B+">B +ve</option><option value="AB+">AB +ve</option>
                        <option value="O-">O -ve</option><option value="A-">A -ve</option><option value="B-">B -ve</option><option value="AB-">AB -ve</option>
                    </select>
                </div>
            </div>
            <div class="form-group"> <label for="avatar_url">Profile Picture URL</label> <input type="url" id="avatar_url"> </div>
            <div class="form-group"> <label for="movie_character">🎬 Movie Character Match for 'Ram' & Why?</label> <input type="text" id="movie_character" placeholder="Rishi from mismatched" required> </div>
            <div class="form-group"> <label for="fav_mem">💬 Best Shared Memory with Ram</label> <textarea id="fav_mem" rows="4" required></textarea> </div>
            <button type="submit" class="btn-submit" id="submitBtn">Lock in Slambook 💝</button>
        </form>
        <a href="view.html" class="view-gallery-link">👁️ View The Memory Vault Room</a>
    </div>

    <script>
        const SUPABASE_URL = "https://vxgcugpbwrjhqlqtiuku.supabase.co";
        const SUPABASE_KEY = "sb_publishable_J9urn-pWkAydGSzvsnASOQ_1wAdGBfD";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let isMusicPlaying = false;

        function playClick() { const s = document.getElementById('sfxClick'); if(s){s.currentTime=0; s.play().catch(()=>{});} }
        function toggleMusic() { const m = document.getElementById('bgMusic'); if(!isMusicPlaying){m.play().catch(()=>{}); isMusicPlaying=true;}else{m.pause(); isMusicPlaying=false;} }
        function changeTheme(v) { const b = document.getElementById('pageBody'); if(v==='default'){b.removeAttribute('data-theme');}else{b.setAttribute('data-theme', v);} }

        async function handleSubmit(e) {
            e.preventDefault(); playClick();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "Writing...";
            
            const name = document.getElementById('name').value.trim();
            const contact_number = document.getElementById('contact_number').value.trim();
            const dob = document.getElementById('dob').value.trim();
            const blood_group = document.getElementById('blood_group').value;
            const movie_character = document.getElementById('movie_character').value.trim();
            const fav_mem = document.getElementById('fav_mem').value.trim();
            let avatar_url = document.getElementById('avatar_url').value.trim() || `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(name)}`;

            const { error } = await supabaseClient.from('slambook').insert([{ name, contact_number, dob, blood_group, avatar_url, movie_character, fav_mem }]);
            if (error) { alert("Error: " + error.message); btn.disabled = false; btn.innerText = "Lock in Slambook 💝"; } 
            else { window.location.href = "view.html"; }
        }
    </script>
</body>
</html>
