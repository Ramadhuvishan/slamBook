<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Slambook 📖</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: url('https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?q=80&w=1974') no-repeat center center fixed; 
            background-size: cover;
            padding: 20px; 
            position: relative;
            overflow-x: hidden;
        }
        
        .container { 
            max-width: 600px; 
            margin: 40px auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
            backdrop-filter: blur(5px);
        }

        .form-group { 
            margin-bottom: 20px; 
            position: relative;
        }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #333;
        }
        
        input[type="text"], input[type="tel"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px dashed #ff6b6b; 
            border-radius: 12px; 
            box-sizing: border-box; 
            background-color: #fffaf0;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border: 2px solid #4ecdc4;
            background-color: #f0ffff;
            box-shadow: 0 0 10px rgba(78, 205, 196, 0.3);
            transform: scale(1.01);
        }

        input[type="file"] {
            padding: 10px;
            background: #ffe66d;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
        
        button { 
            background: linear-gradient(45deg, #ff6b6b, #ff8e53); 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s;
        }
        
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .roaming-helper {
            position: absolute;
            pointer-events: none;
            font-size: 24px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            z-index: 10;
        }

        /* Loading Overlay & Animation */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .book-loader {
            position: relative;
            width: 60px;
            height: 45px;
            perspective: 150px;
        }

        .book-page {
            position: absolute;
            left: 50%; width: 50%; height: 100%;
            border: 2px solid #ff6b6b;
            background: #fffaf0;
            border-radius: 0 4px 4px 0;
            transform-origin: left center;
            animation: flipPage 1.4s infinite linear;
        }

        .book-base {
            position: absolute;
            width: 100%; height: 100%;
            border: 3px solid #333;
            background: #ff8e53;
            border-radius: 4px;
            z-index: -1;
        }

        @keyframes flipPage {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-180deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-weight: bold;
            color: #ff6b6b;
            font-size: 18px;
        }

        /* Thank You Overlay */
        .thank-you-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .thank-you-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 4px solid #ff6b6b;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            max-width: 400px;
            width: 90%;
        }

        .thank-you-card h2 { color: #ff6b6b; margin-bottom: 10px; font-size: 28px; }
        .thank-you-card p { font-size: 20px; color: #4ecdc4; font-weight: bold; margin-bottom: 20px; }
        .thank-you-card .signature { font-family: 'Courier New', Courier, monospace; font-size: 18px; color: #333; font-weight: bold; margin-bottom: 25px; }
        
        .view-book-link {
            display: inline-block;
            background: linear-gradient(45deg, #4ecdc4, #55efc4);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(78, 205, 196, 0.3);
            transition: transform 0.2s;
        }

        .view-book-link:hover {
            transform: scale(1.05);
        }

        .thank-you-card .close-btn { background: #333; padding: 10px 20px; border-radius: 20px; width: auto; font-size: 14px; }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="helper" class="roaming-helper">✨🦄</div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="book-loader">
            <div class="book-base"></div>
            <div class="book-page"></div>
        </div>
        <div class="loading-text">Writing your memory into the book... 📖</div>
    </div>

    <div class="thank-you-overlay" id="thankYouModal">
        <div class="thank-you-card">
            <h2>Good Bye Colleague!</h2>
            <p>See you soon my Friend!</p>
            <div class="signature">-Ram</div>
            
            <a href="view.html" class="view-book-link">📖 View the Full Slambook</a>
            <br>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="container">
        <h2>✍️ Sign My Slambook</h2>
        <form id="slamForm">
            <div class="form-group">
                <label>Your Name:</label>
                <input type="text" id="name" class="interactive-input" required>
            </div>
            <div class="form-group">
                <label>Contact Number:</label>
                <input type="tel" id="contact" class="interactive-input" placeholder="e.g. +1 234 567 890" required>
            </div>
            <div class="form-group">
                <label>Upload your Photo:</label>
                <input type="file" id="avatar" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>Your Favorite Memory with Me:</label>
                <textarea id="memory" class="interactive-input" rows="4" required></textarea>
            </div>
            <button type="submit">Submit Entry ✨</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://vxgcugpbwrjhqlqtiuku.supabase.co";
        const SUPABASE_KEY = "sb_publishable_J9urn-pWkAydGSzvsnASOQ_1wAdGBfD";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('slamForm');
        const helper = document.getElementById('helper');
        const interactiveInputs = document.querySelectorAll('.interactive-input');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Character Roaming Logic
        interactiveInputs.forEach(input => {
            input.addEventListener('focus', () => {
                helper.style.opacity = '1';
                moveHelperTo(input);
            });
            input.addEventListener('input', () => { moveHelperTo(input); });
            input.addEventListener('blur', () => { helper.style.opacity = '0'; });
        });

        function moveHelperTo(input) {
            const rect = input.getBoundingClientRect();
            const textLength = input.value.length;
            const offset = Math.min(textLength * 8 + 20, rect.width - 40);
            helper.style.top = `${window.scrollY + rect.top + (rect.height / 2) - 15}px`;
            helper.style.left = `${window.scrollX + rect.left + offset}px`;
        }

        function showThankYouCard() {
            document.getElementById('thankYouModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('thankYouModal').style.display = 'none';
        }

        // Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Show custom loading book animation
            loadingOverlay.style.display = 'flex';
            
            const name = document.getElementById('name').value;
            const contact = document.getElementById('contact').value;
            const memory = document.getElementById('memory').value;
            const file = document.getElementById('avatar').files[0];

            try {
                // A. Upload Image
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                
                let { error: uploadError } = await supabaseClient.storage
                    .from('avatars')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // Get Public URL
                const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(fileName);

                // B. Save Entry data
                const { error: insertError } = await supabaseClient
                    .from('slambook')
                    .insert([{ 
                        name: name, 
                        contact_number: contact, 
                        fav_mem: memory, 
                        avatar_url: publicUrl 
                    }]);

                if (insertError) throw insertError;

                // Success pipeline
                form.reset();
                setTimeout(() => {
                    loadingOverlay.style.display = 'none'; // hide loading
                    showThankYouCard();
                }, 1200); // Slight artificial wait so they enjoy the page-addition aesthetic

            } catch (err) {
                loadingOverlay.style.display = 'none';
                console.error(err);
                alert(`Something went sideways: ${err.message || err}`);
            }
        });
    </script>
</body>
</html>
